name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check research_assistant tests agentic scripts

      - name: Run tests with coverage
        env:
          # Stub keys so modules that touch `os.environ[...]` at import don't crash.
          ANTHROPIC_API_KEY: "sk-test-stub"
          GEMINI_API_KEY: "stub"
          DEEPSEEK_API_KEY: "stub"
          OPENAI_API_KEY: "stub"
          ZOTERO_USER_ID: "0"
          ZOTERO_API_KEY: "stub"
          THESIS_ROOT: "/tmp/ra_thesis"
        run: |
          mkdir -p /tmp/ra_thesis/bib
          pytest --cov=research_assistant --cov-report=term-missing --cov-report=xml

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
